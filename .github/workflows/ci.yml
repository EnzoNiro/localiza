name: CI Locadora de Carros

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Unit Tests
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        pytest tests/unit/

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Integration Tests
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        pytest tests/integration/

  test-docker:
    name: Docker Execution Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build Docker Image
      run: |
        docker build -t locadora-pipeline .
        
    - name: Run Pipeline in Container
      run: |
        chmod -R 777 ${{ github.workspace }}/data
        docker run --rm --entrypoint python3 -v ${{ github.workspace }}:/opt/airflow locadora-pipeline /opt/airflow/run_local_spark.py
